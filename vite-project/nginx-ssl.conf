events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # Redirect HTTP to HTTPS for joblink360.com
    server {
        listen 80;
        listen [::]:80;
        server_name joblink360.com www.joblink360.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://joblink360.com$request_uri;
        }
    }

    # Redirect HTTP hamrojob.com.np to joblink360.com
    server {
        listen 80;
        listen [::]:80;
        server_name hamrojob.com.np www.hamrojob.com.np;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://joblink360.com$request_uri;
        }
    }

    # Redirect www.joblink360.com to joblink360.com
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name www.joblink360.com;

        # SSL certificates
        ssl_certificate /etc/letsencrypt/live/joblink360.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/joblink360.com/privkey.pem;

        # SSL configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        return 301 https://joblink360.com$request_uri;
    }

    # Main HTTPS server for joblink360.com
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name joblink360.com;

        # SSL certificates
        ssl_certificate /etc/letsencrypt/live/joblink360.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/joblink360.com/privkey.pem;

        # SSL configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Root directory for frontend
        root /usr/share/nginx/html;
        index index.html;

        # API proxy to backend
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://job-portal-backend:5000/api/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 90s;
        }

        # Frontend SPA routing
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Uploads directory
        location /uploads/ {
            alias /app/uploads/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }
}
